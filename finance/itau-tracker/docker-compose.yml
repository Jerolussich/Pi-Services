services:
  itau-tracker:
    build:
      context: ./tracker
      dockerfile: Dockerfile
    container_name: itau-tracker
    volumes:
      - ./data:/app/data
    restart: unless-stopped
    labels:
      ofelia.enabled: "true"
      ofelia.job-exec.itau-tracker.schedule: "0 * * * *"
      ofelia.job-exec.itau-tracker.command: "python /app/fetch.py"
  itau-tracker-ui:
    build:
      context: ./ui
      dockerfile: Dockerfile
    container_name: itau-tracker-ui
    volumes:
      - ./data:/app/data
      - ./tracker/fetch.py:/app/fetch.py
    env_file:
      - .env
    restart: unless-stopped
networks:
  default:
    name: pi-services
    external: true
