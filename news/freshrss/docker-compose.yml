services:
  freshrss:
    image: freshrss/freshrss:latest
    container_name: freshrss
    ports:
      - 8083:80
    environment:
      - TZ=America/Montevideo
      - CRON_MIN=0,30
    volumes:
      - freshrss-data:/var/www/FreshRSS/data
      - freshrss-extensions:/var/www/FreshRSS/extensions
    restart: unless-stopped

volumes:
  freshrss-data:
  freshrss-extensions:
