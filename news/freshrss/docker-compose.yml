services:
  freshrss:
    image: freshrss/freshrss:latest
    container_name: freshrss
    environment:
      - TZ=America/Montevideo
      - CRON_MIN=0,30
    volumes:
      - freshrss-data:/var/www/FreshRSS/data
      - freshrss-extensions:/var/www/FreshRSS/extensions
    restart: unless-stopped
volumes:
  freshrss-data:
  freshrss-extensions:

networks:
  default:
    name: pi-services
    external: true
